  - type: Features
    data:
      - name: Affiliate Program
        description: Affiliate partners earn commissions on referred purchases via Barnes & Noble's affiliate program, currently administered through partner networks.
      - name: B&N Press Self-Publishing
        description: B&N Press lets independent authors publish ebooks for the Nook platform and print-on-demand paperbacks for distribution through Barnes & Noble channels.
      - name: Nook Reading Ecosystem
        description: Nook ebooks and audiobooks are distributed and rendered through the Nook iOS, Android, and web apps and Nook GlowLight devices.
      - name: Wholesale and EDI
        description: Trade publishers exchange purchase orders, ASNs, invoices, and returns with Barnes & Noble using x12 EDI transactions.
      - name: Educator and Library Programs
        description: B&N runs educator discount and bulk-order programs for schools, libraries, and institutional buyers.
  - type: UseCases
    data:
      - name: Affiliate Marketing
        description: Publishers, review sites, and influencers earn commissions on Barnes & Noble book sales through affiliate referrals.
      - name: Independent Author Publishing
        description: Authors self-publish ebooks and paperbacks to the Nook store and B&N retail channels via B&N Press.
      - name: Publisher Wholesale Integration
        description: Publishers and distributors integrate purchase order, fulfillment, and returns processing with Barnes & Noble via EDI.
      - name: Educational Bulk Procurement
        description: Schools, libraries, and education institutions order books, curriculum kits, and Nook content via dedicated B&N education programs.
  - type: Compliance
    data:
      - name: PCI DSS
        description: Payment-card processing for in-store and online purchases conforms to the Payment Card Industry Data Security Standard.
      - name: CCPA / CPRA
        description: California consumer privacy rights are honored under the California Consumer Privacy Act as amended by the CPRA.
      - name: COPPA
        description: Nook Kids content and account flows enforce age gating consistent with the Children's Online Privacy Protection Act.
      - name: ADA / WCAG
        description: Barnes & Noble's digital surfaces target accessibility consistent with the Americans with Disabilities Act and WCAG guidelines.
