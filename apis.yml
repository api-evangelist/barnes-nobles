description: >-
  Barnes & Noble is the largest retail bookseller in the United States and the
  operator of the Nook digital reading platform. Barnes & Noble does not
  currently publish a public general-purpose developer portal. Trade and
  affiliate partners integrate through B&N's affiliate program, the B&N Press
  self-publishing platform for independent authors, EDI-based wholesale
  channels with publishers, and the Nook content distribution and reading
  ecosystem.
